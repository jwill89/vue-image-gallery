name: CI

on:
  push:
    branches: [master, main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend — PHP ${{ matrix.php }} (lint + tests)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: ['8.5']
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: pdo_sqlite, curl, gd, mbstring
          tools: composer
          coverage: pcov

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: backend/vendor
          key: composer-${{ matrix.php }}-${{ hashFiles('backend/composer.lock') }}
          restore-keys: composer-${{ matrix.php }}-

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Lint (phpcs / PSR-12)
        run: composer lint

      - name: Test (PHPUnit + coverage)
        run: composer test:coverage

  frontend:
    name: Frontend — Node ${{ matrix.node }} (build + tests)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: ['22']
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check & build
        run: npm run build

      - name: Test (Vitest + coverage)
        run: npm run test:coverage
